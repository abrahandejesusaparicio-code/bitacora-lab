// Elimina una foto ya subida (storage + registro). Permitido a admin o autor/asignado (RLS).
async function deletePhoto(photo) {
  const { error } = await supabase.from("photos").delete().eq("id", photo.id);
  if (error) { logErr("Eliminar foto", error); return; }
  try { await supabase.storage.from("evidence").remove([photo.storage_path]); } catch (e) { console.error("storage remove", e); }
  await loadLabData(); render();
  toast("Foto eliminada", "ok");
}

// Cámara dentro de la app vía getUserMedia (no depende del atributo 'capture').
async function openCamera(part, facing = "environment") {
  // fallback si el navegador no soporta cámara web: input nativo, luego confirmar
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    const inp = el("input", { type: "file", accept: "image/*", style: { display: "none" } });
    inp.setAttribute("capture", "environment");
    inp.addEventListener("change", () => { const f = inp.files && inp.files[0]; inp.remove(); if (f) confirmPhoto(part, f, () => openCamera(part, facing), "Repetir"); });
    document.body.appendChild(inp); inp.click();
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: facing }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
  } catch (e) {
    console.error("getUserMedia", e);
    toast("No se pudo abrir la cámara (¿permiso denegado?). Usa 'Elegir de la galería'.", "err");
    return;
  }
  const back = el("div", { class: "cam-back" });
  const video = el("video");
  video.autoplay = true; video.muted = true; video.playsInline = true;
  video.setAttribute("playsinline", ""); video.setAttribute("muted", "");
  video.srcObject = stream;
  if (video.play) video.play().catch(() => {});

  // === ENFOQUE === autoenfoque continuo + toca-para-enfocar (faltaba)
  const track = stream.getVideoTracks ? stream.getVideoTracks()[0] : null;
  (async () => { try { const c = track && track.getCapabilities ? track.getCapabilities() : {}; if (c.focusMode && c.focusMode.includes("continuous")) await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] }); } catch (_) {} })();
  const focusRing = el("div", { class: "cam-focus" });
  async function focusAt(nx, ny) {
    try {
      const c = track && track.getCapabilities ? track.getCapabilities() : {};
      if (!c.focusMode) return;
      const mode = c.focusMode.includes("single-shot") ? "single-shot" : (c.focusMode.includes("manual") ? "manual" : null);
      if (!mode) return;
      const adv = { focusMode: mode };
      if (c.pointsOfInterest) adv.pointsOfInterest = [{ x: nx, y: ny }];
      await track.applyConstraints({ advanced: [adv] });
      setTimeout(() => { try { if (c.focusMode.includes("continuous")) track.applyConstraints({ advanced: [{ focusMode: "continuous" }] }); } catch (_) {} }, 2500);
    } catch (_) {}
  }
  video.addEventListener("click", (ev) => {
    if (back.classList.contains("previewing")) return;
    const r = video.getBoundingClientRect();
    focusRing.style.left = (ev.clientX - r.left) + "px";
    focusRing.style.top = (ev.clientY - r.top) + "px";
    focusRing.classList.remove("show"); void focusRing.offsetWidth; focusRing.classList.add("show");
    focusAt(Math.min(1, Math.max(0, (ev.clientX - r.left) / r.width)), Math.min(1, Math.max(0, (ev.clientY - r.top) / r.height)));
  });

  const photoImg = el("img", { class: "cam-photo", alt: "captura" });

  let captured = null, photoUrl = null;
  const stop = () => { try { stream.getTracks().forEach(t => t.stop()); } catch (_) {} if (photoUrl) URL.revokeObjectURL(photoUrl); back.remove(); };
  const toPreview = (blob) => {
    captured = blob;
    if (photoUrl) URL.revokeObjectURL(photoUrl);
    photoUrl = URL.createObjectURL(blob);
    photoImg.src = photoUrl;
    back.classList.add("previewing");
  };
  const toLive = () => {
    captured = null;
    if (photoUrl) { URL.revokeObjectURL(photoUrl); photoUrl = null; }
    back.classList.remove("previewing");
  };

  const shutter = el("button", { class: "cam-shutter", title: "Capturar", onclick: () => {
    const w = video.videoWidth, h = video.videoHeight;
    if (!w || !h) { toast("Espera a que cargue la cámara…", "err"); return; }
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(video, 0, 0, w, h);
    canvas.toBlob((blob) => { if (blob) toPreview(blob); else toast("No se pudo capturar la foto", "err"); }, "image/jpeg", 0.92);
  } });
  const closeBtn = el("button", { class: "cam-close", title: "Cerrar", html: ICON.close({ size: 22 }), onclick: stop });
  const switchBtn = el("button", { class: "cam-switch", title: "Voltear cámara", html: ICON.camera({ size: 22 }),
    onclick: () => { stop(); openCamera(part, facing === "environment" ? "user" : "environment"); } });
  const retakeBtn = el("button", { class: "cam-retake", html: ICON.close({ size: 16 }) + " Repetir", onclick: toLive });
  const useBtn = el("button", { class: "cam-use", html: ICON.check({ size: 16 }) + " Usar foto", onclick: async () => {
    const blob = captured; stop();
    if (blob) await uploadPhoto(part, new File([blob], "foto_" + Date.now() + ".jpg", { type: "image/jpeg" }));
  } });

  back.appendChild(video);
  back.appendChild(focusRing);
  back.appendChild(photoImg);
  back.appendChild(el("div", { class: "cam-hint", text: part.title }));
  back.appendChild(el("div", { class: "cam-tip", text: "Toca la imagen para enfocar" }));
  back.appendChild(shutter);
  back.appendChild(closeBtn);
  back.appendChild(switchBtn);
  back.appendChild(retakeBtn);
  back.appendChild(useBtn);
  document.body.appendChild(back);
}

/* ---------- Celebraciones (confeti de química) ---------- */
function confettiBurst(canvas, opts) {
  opts = opts || {};
  const ctx = canvas.getContext("2d");
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const count = opts.count || 90, power = opts.power || 9;
  const ox = opts.ox != null ? opts.ox : W / 2, oy = opts.oy != null ? opts.oy : H * 0.42;
  const ATOMS = ["H", "O", "C", "N", "Na", "Cl"];
  const HUE = { H: 8, O: 205, C: 222, N: 265, Na: 35, Cl: 140 };
  const COLORS = ["hsl(8 75% 62%)", "hsl(205 70% 60%)", "hsl(35 78% 60%)", "hsl(140 48% 52%)", "hsl(265 50% 62%)"];
  const ps = [];
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, sp = power * (0.4 + Math.random() * 0.9), atom = Math.random() < 0.55;
    ps.push({ x: ox, y: oy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - power * 0.7,
      g: 0.16 + Math.random() * 0.09, rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.32,
      size: atom ? (10 + Math.random() * 8) : (5 + Math.random() * 6), life: 0, max: 90 + Math.random() * 50,
      type: atom ? "atom" : "rect", sym: ATOMS[Math.floor(Math.random() * 6)], color: COLORS[Math.floor(Math.random() * COLORS.length)] });
  }
  let raf = 0;
  function frame() {
    ctx.clearRect(0, 0, W, H);
    let alive = 0;
    for (const p of ps) {
      p.life++; if (p.life > p.max) continue;
      alive++;
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.rot += p.vr;
      ctx.globalAlpha = Math.max(0, 1 - p.life / p.max);
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      if (p.type === "atom") {
        const h = HUE[p.sym] || 14;
        ctx.beginPath(); ctx.arc(0, 0, p.size, 0, 6.2832); ctx.fillStyle = `hsl(${h} 65% 66%)`; ctx.fill();
        ctx.fillStyle = `hsl(${h} 60% 26%)`; ctx.font = `700 ${Math.round(p.size * 0.9)}px system-ui, sans-serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(p.sym, 0, 0.5);
      } else {
        ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    if (alive > 0) raf = requestAnimationFrame(frame);
  }
  raf = requestAnimationFrame(frame);
  return () => cancelAnimationFrame(raf);
}

function celebrate(kind, onClose, label) {
  const big = kind === "lab";
  const back = el("div", { class: "cele-back" });
  const canvas = el("canvas", { class: "cele-confetti" });
  back.appendChild(canvas);
  const card = el("div", { class: "cele-card" + (big ? " big" : "") });
  if (big) card.appendChild(el("div", { class: "cele-flask", html: ICON.flask() }));
  else card.appendChild(el("div", { class: "cele-check", html: '<svg viewBox="0 0 24 24"><path d="M5 12.5l4 4 10-10"/></svg>' }));
  const titles = { part: "¡Parte terminada!", mine: "¡Completaste todas tus partes!", lab: "¡Laboratorio completado!" };
  card.appendChild(el("h2", { class: "cele-title", text: titles[kind] || "¡Listo!" }));
  const sub = kind === "mine" ? "Buen trabajo 👏" : (label || "");
  if (sub) card.appendChild(el("p", { class: "cele-sub", text: sub }));
  const btn = el("button", { class: "cele-btn", text: big ? "¡Excelente!" : "Continuar" });
  card.appendChild(btn);
  back.appendChild(card);
  document.body.appendChild(back);
  const stop = confettiBurst(canvas, big ? { count: 170, power: 13 } : { count: 95, power: 9 });
  let closed = false;
  const close = () => {
    if (closed) return; closed = true;
    if (stop) stop();
    back.style.transition = "opacity .3s"; back.style.opacity = "0";
    setTimeout(() => back.remove(), 300);
    if (onClose) onClose();
  };
  btn.addEventListener("click", close);
  back.addEventListener("click", e => { if (e.target === back) close(); });
  setTimeout(close, big ? 4400 : 2900);
}

function runCelebrations(list, part, done) {
  if (!list.length) { if (done) done(); return; }
  const kind = list.shift();
  const lab = state.labs.find(l => l.id === state.currentLabId);
  const label = kind === "part" ? part.title : (kind === "lab" ? (lab ? lab.name : "") : "");
  celebrate(kind, () => runCelebrations(list, part, done), label);
}

/* ============================================================= *
 *  TIEMPO REAL (Supabase Realtime) — actualiza la vista sola
 * ============================================================= */
let realtimeChannel = null;
let rtTimer = null;
function subscribeRealtime() {
  if (realtimeChannel) return; // ya suscrito
  realtimeChannel = supabase.channel("labtodo-rt")
    .on("postgres_changes", { event: "*", schema: "public", table: "labs" }, onRealtimeChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "parts" }, onRealtimeChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "assignments" }, onRealtimeChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "photos" }, onRealtimeChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "teams" }, onRealtimeChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "team_members" }, onRealtimeChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "join_requests" }, onRealtimeChange)
    .on("broadcast", { event: "lab_done" }, (msg) => {
      const p = (msg && msg.payload) || {};
      if (p.labId && p.labId === state.currentLabId) celebrate("lab", null, p.name || "");
    })
    .on("broadcast", { event: "teams_generated" }, async () => {
      await loadTeams();
      if (state.view === "app") render();
      playBasketReveal();
    })
    .on("broadcast", { event: "member_joined" }, (msg) => {
      const p = (msg && msg.payload) || {};
      if (p.user && p.team) celebrateJoin(p.user, p.team);
    })
    .subscribe((status) => {
      const on = status === "SUBSCRIBED";
      if (on !== state.realtimeOn) { state.realtimeOn = on; if (state.view === "app") render(); }
    });
}
function unsubscribeRealtime() {
  if (realtimeChannel) { try { supabase.removeChannel(realtimeChannel); } catch (_) {} realtimeChannel = null; }
  state.realtimeOn = false;
}
function onRealtimeChange() {
  // recarga con rebote para no refrescar 10 veces seguidas
  clearTimeout(rtTimer);
  rtTimer = setTimeout(async () => {
    if (!state.session) return;
    await loadLabs();
    await loadTeams();
    if (state.currentLabId) await loadLabData();
    render();
  }, 400);
}

/* ============================================================= *
 *  FONDO ANIMADO — burbujas de elementos que rebotan y se fusionan
 * ============================================================= */
function initBackgroundFX() {
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const host = document.createElement("div");
  host.className = "bgfx";
  const canvas = document.createElement("canvas");
  host.appendChild(canvas);
  document.body.insertBefore(host, document.body.firstChild);

  // herramientas de laboratorio flotando en las esquinas
  const molecule = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="6" cy="7" r="2.3"/><circle cx="17.5" cy="6" r="2.3"/><circle cx="12" cy="16.5" r="2.3"/><path d="M8 8.2l3 6.4M15.4 7.2l-4.2 8"/></svg>';
  const tools = [
    { html: ICON.flask(), css: "top:7%;left:5%;width:52px;height:52px;animation-delay:0s" },
    { html: ICON.beaker(), css: "top:13%;right:6%;width:62px;height:62px;animation-delay:-3.5s" },
    { html: molecule, css: "bottom:9%;left:8%;width:50px;height:50px;animation-delay:-7s" },
    { html: ICON.flask(), css: "bottom:14%;right:7%;width:44px;height:44px;animation-delay:-10s" },
  ];
  host.insertAdjacentHTML("beforeend", tools.map(t => `<span class="bgfx-tool" style="${t.css}">${t.html}</span>`).join(""));

  const ctx = canvas.getContext("2d");
  let W = 0, H = 0;
  function resize() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener("resize", resize);

  const EL = { // hue, saturación por elemento
    H: { h: 8, s: 75 }, O: { h: 205, s: 70 }, C: { h: 222, s: 16 },
    N: { h: 265, s: 50 }, Na: { h: 35, s: 78 }, Cl: { h: 140, s: 48 }, _c: { h: 14, s: 64 },
  };
  const ATOMS = ["H", "O", "C", "N", "Na", "Cl"];
  const RULES = { "H|O": "H₂O", "Cl|Na": "NaCl", "Cl|H": "HCl", "C|O": "CO₂", "H|N": "NH₃", "C|H": "CH₄" };
  const rnd = (a, b) => a + Math.random() * (b - a);
  const isMobile = W < 640;
  const TARGET = isMobile ? 7 : 13;
  const parts = [], pops = [];

  function spawn(x, y) {
    parts.push({ x: x == null ? rnd(40, W - 40) : x, y: y == null ? rnd(40, H - 40) : y,
      vx: rnd(-0.45, 0.45), vy: rnd(-0.45, 0.45), r: rnd(16, 24),
      sym: ATOMS[Math.floor(Math.random() * ATOMS.length)], kind: "atom" });
  }
  for (let i = 0; i < TARGET; i++) spawn();
  function pop(x, y) { pops.push({ x, y, t: 0 }); }

  function draw(p) {
    const e = p.kind === "compound" ? EL._c : (EL[p.sym] || EL._c);
    const g = ctx.createRadialGradient(p.x - p.r * 0.32, p.y - p.r * 0.32, p.r * 0.1, p.x, p.y, p.r);
    g.addColorStop(0, `hsl(${e.h} ${e.s}% 84%)`);
    g.addColorStop(1, `hsl(${e.h} ${e.s}% 62%)`);
    ctx.globalAlpha = p.kind === "compound" ? 0.66 : 0.5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
    ctx.globalAlpha = 0.5; ctx.lineWidth = 1.5; ctx.strokeStyle = `hsl(${e.h} ${Math.min(60, e.s)}% 48%)`; ctx.stroke();
    ctx.globalAlpha = p.kind === "compound" ? 0.95 : 0.85;
    const fs = p.sym.length <= 2 ? p.r * 0.82 : (p.sym.length === 3 ? p.r * 0.62 : p.r * 0.5);
    ctx.fillStyle = `hsl(${e.h} ${e.s}% 26%)`;
    ctx.font = `700 ${Math.round(fs)}px -apple-system, system-ui, "Segoe UI", sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(p.sym, p.x, p.y + 1);
    ctx.globalAlpha = 1;
  }

  let running = !document.hidden, raf = 0;
  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of parts) {
      if (p.held) continue; // pieza arrastrada: la fija el puntero
      p.x += p.vx; p.y += p.vy;
      p.vx += rnd(-0.012, 0.012); p.vy += rnd(-0.012, 0.012);
      const sp = Math.hypot(p.vx, p.vy); if (sp > 0.75) { p.vx = p.vx / sp * 0.75; p.vy = p.vy / sp * 0.75; }
      if (p.x < p.r) { p.x = p.r; p.vx = Math.abs(p.vx); }
      if (p.x > W - p.r) { p.x = W - p.r; p.vx = -Math.abs(p.vx); }
      if (p.y < p.r) { p.y = p.r; p.vy = Math.abs(p.vy); }
      if (p.y > H - p.r) { p.y = H - p.r; p.vy = -Math.abs(p.vy); }
      if (p.kind === "compound") p.life--;
    }
    for (let i = 0; i < parts.length; i++) {
      for (let j = i + 1; j < parts.length; j++) {
        const a = parts[i], b = parts[j];
        const dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy), min = a.r + b.r;
        if (d < min && d > 0.01) {
          if (a.kind === "atom" && b.kind === "atom" && !a.held && !b.held) {
            const comp = RULES[[a.sym, b.sym].sort().join("|")];
            if (comp) {
              const nx = (a.x + b.x) / 2, ny = (a.y + b.y) / 2;
              parts.splice(j, 1); parts.splice(i, 1);
              parts.push({ x: nx, y: ny, vx: (a.vx + b.vx) / 2, vy: (a.vy + b.vy) / 2, r: Math.min(34, (a.r + b.r) * 0.72), sym: comp, kind: "compound", life: rnd(360, 600) });
              pop(nx, ny); i--; break;
            }
          }
          const nx = dx / d, ny = dy / d, ov = (min - d) / 2;
          // la pieza arrastrada no se desplaza ni cambia su velocidad; sí empuja a las demás
          if (!a.held) { a.x -= nx * ov; a.y -= ny * ov; }
          if (!b.held) { b.x += nx * ov; b.y += ny * ov; }
          const va = a.vx * nx + a.vy * ny, vb = b.vx * nx + b.vy * ny, diff = vb - va;
          if (!a.held) { a.vx += diff * nx; a.vy += diff * ny; }
          if (!b.held) { b.vx -= diff * nx; b.vy -= diff * ny; }
        }
      }
    }
    for (let i = parts.length - 1; i >= 0; i--) {
      if (parts[i].kind === "compound" && parts[i].life <= 0) {
        pop(parts[i].x, parts[i].y);
        const px = parts[i].x, py = parts[i].y;
        parts.splice(i, 1); spawn(px, py); spawn(px, py);
      }
    }
    while (parts.length < TARGET) spawn();
    for (let i = pops.length - 1; i >= 0; i--) {
      const q = pops[i]; q.t += 1;
      ctx.globalAlpha = Math.max(0, 0.5 - q.t / 56); ctx.lineWidth = 2;
      ctx.strokeStyle = "hsl(14 60% 55%)";
      ctx.beginPath(); ctx.arc(q.x, q.y, q.t * 1.3, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
      if (q.t > 28) pops.splice(i, 1);
    }
    for (const p of parts) draw(p);
    if (running) raf = requestAnimationFrame(frame);
  }

  // redibujo estático (para modo "reduce" mientras se arrastra)
  function redraw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of parts) draw(p);
  }

  /* ---- Arrastrar burbujas (mouse + táctil) ---- */
  // toma la burbuja más arriba (última dibujada) bajo el puntero
  function hitTest(px, py) {
    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i], dx = px - p.x, dy = py - p.y, rr = p.r + 8;
      if (dx * dx + dy * dy <= rr * rr) return p;
    }
    return null;
  }
  let drag = null;
  function onMove(e) {
    if (!drag) return;
    e.preventDefault();                       // evita scroll/selección mientras arrastras
    const nx = Math.max(drag.r, Math.min(W - drag.r, e.clientX));
    const ny = Math.max(drag.r, Math.min(H - drag.r, e.clientY));
    drag.vx = nx - drag.x; drag.vy = ny - drag.y;   // impulso al soltar
    drag.x = nx; drag.y = ny;
    if (reduce || !running) redraw();
  }
  function onUp() {
    if (drag) {
      drag.held = false;
      const sp = Math.hypot(drag.vx, drag.vy);       // limita el "fling"
      if (sp > 4) { drag.vx = drag.vx / sp * 4; drag.vy = drag.vy / sp * 4; }
      drag = null;
    }
    document.body.style.cursor = "";
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
    window.removeEventListener("pointercancel", onUp);
  }
  function onDown(e) {
    if (e.pointerType === "mouse" && e.button !== 0) return;   // solo clic izquierdo
    // solo iniciar sobre el fondo vacío (no robar toques/scroll del contenido de la app)
    const t = e.target;
    const onBg = t === document.body || t === document.documentElement ||
      (t.id === "root") || (t.classList && (t.classList.contains("app") || t.classList.contains("bgfx")));
    if (!onBg) return;
    const p = hitTest(e.clientX, e.clientY);
    if (!p) return;
    drag = p; p.held = true; p.vx = 0; p.vy = 0;
    document.body.style.cursor = "grabbing";
    window.addEventListener("pointermove", onMove, { passive: false });
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
    e.preventDefault();
    if (reduce || !running) redraw();
  }
  window.addEventListener("pointerdown", onDown, { passive: false });

  if (reduce) { frame(); return; } // un solo cuadro estático (pero las burbujas siguen siendo arrastrables)
  raf = requestAnimationFrame(frame);
  document.addEventListener("visibilitychange", () => {
    running = !document.hidden;
    if (running) raf = requestAnimationFrame(frame); else cancelAnimationFrame(raf);
  });
}
